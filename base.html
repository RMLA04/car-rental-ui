<!DOCTYPE html>
<html>
<head>
    <title>Car Rental System</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        nav {
            background: #222;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .container {
            padding: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        form {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            box-shadow: 0 0 5px #ccc;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Dashboard</a>
    <a href="/customers">Customers</a>
    <a href="/cars">Cars</a>
    <a href="/rentals">Rentals</a>
    <a href="/payments">Payments</a>
    <a href="/reports">Reports</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
