{% extends "base.html" %}

{% block content %}
<h1>Car Rental Management System</h1>

<div class="card">
    <h3>Customers</h3>
    <p>{{ customers }}</p>
</div>

<div class="card">
    <h3>Cars</h3>
    <p>{{ cars }}</p>
</div>

<div class="card">
    <h3>Rentals</h3>
    <p>{{ rentals }}</p>
</div>

<div class="card">
    <h3>Total Revenue</h3>
    <p>${{ revenue }}</p>
</div>
{% endblock %}
